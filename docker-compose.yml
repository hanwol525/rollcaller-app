services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: appdb
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d appdb"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg2://user:password@postgres:5432/appdb
      STORAGE_BACKEND: filesystem
      STORAGE_FS_ROOT: /data/blobstore
      ORGANIZER_USERNAME: ${ORGANIZER_USERNAME:-organizer}
      ORGANIZER_PASSWORD: ${ORGANIZER_PASSWORD:-changeme}
      SESSION_SECRET: ${SESSION_SECRET:-dev-secret-change-in-production}
      # Cache model weights on a volume so they download once, not every boot.
      HF_HOME: /models
    volumes:
      - blobstore:/data/blobstore
      - models:/models
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 5s
      timeout: 5s
      retries: 10

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    environment:
      BACKEND_URL: http://backend:8000
    depends_on:
      - backend
    ports:
      - "5173:5173"

volumes:
  pgdata:
  blobstore:
  models: