# Templates for the K8s secrets the rollcaller backend reads.
# Real values are NEVER committed — these files hold placeholders only.
# Populate them from GCP Secret Manager (one-time setup), e.g.:
#
#   kubectl create secret generic rollcaller-db -n rollcall \
#     --from-literal=database_url="postgresql+psycopg2://rollcaller:<pw>@localhost:5432/rollcaller" \
#     --from-literal=connection_name="personal-project-289714:us-central1:automation-db-v2"
#
#   kubectl create secret generic rollcaller-gcs -n rollcall \
#     --from-literal=s3_access_key="<GCS_HMAC_ACCESS_KEY>" \
#     --from-literal=s3_secret_key="<GCS_HMAC_SECRET_KEY>"
#
#   kubectl create secret generic rollcaller-auth -n rollcall \
#     --from-literal=organizer_username="<organizer_username>" \
#     --from-literal=organizer_password="<organizer_password>" \
#     --from-literal=session_secret="$(openssl rand -hex 32)"
#
# See the deploy workflow header for the full one-time infra runbook
# (Cloud SQL DB on automation-db-v2, GCS bucket + HMAC keys, Secret Manager,
# runtime + CI Workload Identity, GitHub secrets/vars).
---
apiVersion: v1
kind: Secret
metadata:
  name: rollcaller-db
  namespace: rollcall
  labels:
    app.kubernetes.io/name: rollcaller
    app.kubernetes.io/component: database
    app.kubernetes.io/part-of: rollcaller
type: Opaque
stringData:
  # Full SQLAlchemy URL the FastAPI app reads via settings.database_url.
  # Points at the Cloud SQL Auth Proxy sidecar on localhost:5432.
  database_url: "postgresql+psycopg2://rollcaller:${DB_PASSWORD}@localhost:5432/rollcaller"
  # Cloud SQL instance connection name (project:region:instance).
  connection_name: "personal-project-289714:us-central1:automation-db-v2"
---
apiVersion: v1
kind: Secret
metadata:
  name: rollcaller-gcs
  namespace: rollcall
  labels:
    app.kubernetes.io/name: rollcaller
    app.kubernetes.io/component: storage
    app.kubernetes.io/part-of: rollcaller
type: Opaque
stringData:
  # GCS HMAC interop key pair (S3-compatible). Create under the bucket:
  #   gcloud storage hmac keys create --project=personal-project-289714 \
  #     --service-account=<sa email>   (or a dedicated HMAC user)
  s3_access_key: "${S3_ACCESS_KEY}"
  s3_secret_key: "${S3_SECRET_KEY}"
---
apiVersion: v1
kind: Secret
metadata:
  name: rollcaller-auth
  namespace: rollcall
  labels:
    app.kubernetes.io/name: rollcaller
    app.kubernetes.io/component: auth
    app.kubernetes.io/part-of: rollcaller
type: Opaque
stringData:
  organizer_username: "${ORGANIZER_USERNAME}"
  organizer_password: "${ORGANIZER_PASSWORD}"
  # Random HS256-style secret for session signing. Rotate freely; opaque
  # session tokens are stored in the DB, so rotation only invalidates nothing
  # load-bearing here today — keep it for future signed-cookie use.
  session_secret: "${SESSION_SECRET}"
