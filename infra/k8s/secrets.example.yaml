# K8s secrets for the rollcaller backend.
#
# These are synced by the CI pipeline from GCP Secret Manager on each deploy
# (see the "Sync secrets from Secret Manager" step in deploy.yml). The values
# below are placeholders only — never commit real credentials.
#
# MinIO storage runs as an in-cluster sidecar — no GCS or external storage
# credentials needed. The rollcaller-minio secret holds the MinIO root
# user/password (static, in-cluster only, synced from Secret Manager).
---
apiVersion: v1
kind: Secret
metadata:
  name: rollcaller-db
  namespace: rollcall
  labels:
    app.kubernetes.io/name: rollcaller
    app.kubernetes.io/component: database
    app.kubernetes.io/part-of: rollcaller
type: Opaque
stringData:
  database_url: "${DB_URL}"
  connection_name: "personal-project-289714:us-central1:automation-db-v2"
---
apiVersion: v1
kind: Secret
metadata:
  name: rollcaller-auth
  namespace: rollcall
  labels:
    app.kubernetes.io/name: rollcaller
    app.kubernetes.io/component: auth
    app.kubernetes.io/part-of: rollcaller
type: Opaque
stringData:
  organizer_username: "${ORGANIZER_USERNAME}"
  organizer_password: "${ORGANIZER_PASSWORD}"
  session_secret: "${SESSION_SECRET}"
---
apiVersion: v1
kind: Secret
metadata:
  name: rollcaller-gemma
  namespace: rollcall
  labels:
    app.kubernetes.io/name: rollcaller
    app.kubernetes.io/component: gemma
    app.kubernetes.io/part-of: rollcaller
type: Opaque
stringData:
  gemma_model: "${GEMMA_MODEL}"
  gemma_base_url: "${GEMMA_BASE_URL}"
  gemma_api_key: "${GEMMA_API_KEY}"
---
apiVersion: v1
kind: Secret
metadata:
  name: rollcaller-minio
  namespace: rollcall
  labels:
    app.kubernetes.io/name: rollcaller
    app.kubernetes.io/component: storage
    app.kubernetes.io/part-of: rollcaller
type: Opaque
stringData:
  access_key: "${MINIO_ACCESS_KEY}"
  secret_key: "${MINIO_SECRET_KEY}"
