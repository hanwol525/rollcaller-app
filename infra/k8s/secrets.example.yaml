# K8s secrets for the rollcaller backend.
#
# These are synced by the CI pipeline from GCP Secret Manager on each deploy
# (see the "Sync secrets from Secret Manager" step in deploy.yml). The values
# below are placeholders only — never commit real credentials.
#
# GCS storage does NOT need a secret — the backend uses native GCS via
# Workload Identity (ADC). The pod's GSA has roles/storage.objectAdmin on the
# bucket, so no HMAC keys or access tokens are needed.
---
apiVersion: v1
kind: Secret
metadata:
  name: rollcaller-db
  namespace: rollcall
  labels:
    app.kubernetes.io/name: rollcaller
    app.kubernetes.io/component: database
    app.kubernetes.io/part-of: rollcaller
type: Opaque
stringData:
  # Full SQLAlchemy URL. Points at the Cloud SQL Auth Proxy sidecar on
  # localhost:5432. Synced from Secret Manager secret `rollcaller-db-url`.
  database_url: "${DB_URL}"
  # Cloud SQL instance connection name (not secret, but convenient to bundle).
  connection_name: "personal-project-289714:us-central1:automation-db-v2"
---
apiVersion: v1
kind: Secret
metadata:
  name: rollcaller-auth
  namespace: rollcall
  labels:
    app.kubernetes.io/name: rollcaller
    app.kubernetes.io/component: auth
    app.kubernetes.io/part-of: rollcaller
type: Opaque
stringData:
  organizer_username: "${ORGANIZER_USERNAME}"
  organizer_password: "${ORGANIZER_PASSWORD}"
  session_secret: "${SESSION_SECRET}"
