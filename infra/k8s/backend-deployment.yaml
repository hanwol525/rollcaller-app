# RollCaller backend — Deployment + Service + Ingress.
#
# Deploys to the shared GKE Autopilot cluster (cluster, us-central1,
# personal-project-289714) on namespace `rollcall`, following the same
# pattern as the Predictions dashboard:
#   - Cloud SQL Auth Proxy sidecar (Workload Identity, no stored keys)
#   - ClusterIP Service + nginx ingress + cert-manager letsencrypt-prod TLS
#   - Image tag replaced by CI (kubectl set image) with the git-SHA tag
#
# Backend-only for now. When the SvelteKit frontend is ready, add a second
# Deployment/Service for `rollcaller-frontend` and change the Ingress so `/`
# routes to the frontend while the browser-direct API prefixes (`/auth`,
# `/invite`, `/media`) route here. `/spaces` API stays SSR-only (called
# in-cluster, not through the ingress), so it does NOT need an ingress rule.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rollcaller-backend
  namespace: rollcall
  labels:
    app.kubernetes.io/name: rollcaller
    app.kubernetes.io/component: backend
    app.kubernetes.io/part-of: rollcaller
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: rollcaller
      app.kubernetes.io/component: backend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: rollcaller
        app.kubernetes.io/component: backend
        app.kubernetes.io/part-of: rollcaller
    spec:
      serviceAccountName: rollcaller
      terminationGracePeriodSeconds: 30
      containers:
        # --- RollCaller API (FastAPI, port 8000) ---
        - name: backend
          image: REGISTRY/rollcaller-backend:latest  # replaced by CI (git-SHA tag)
          ports:
            - containerPort: 8000
              protocol: TCP
              name: http
          env:
            # Postgres via the Cloud SQL Auth Proxy sidecar on localhost:5432.
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: rollcaller-db
                  key: database_url
            # Object storage: GCS via S3 interoperability (HMAC keys).
            - name: STORAGE_BACKEND
              value: "minio"
            - name: S3_ENDPOINT
              value: "https://storage.googleapis.com"
            - name: S3_BUCKET
              value: "rollcaller-media"
            - name: S3_SECURE
              value: "true"
            - name: S3_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: rollcaller-gcs
                  key: s3_access_key
            - name: S3_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: rollcaller-gcs
                  key: s3_secret_key
            # Seeded organizer + session signing secret.
            - name: ORGANIZER_USERNAME
              valueFrom:
                secretKeyRef:
                  name: rollcaller-auth
                  key: organizer_username
            - name: ORGANIZER_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: rollcaller-auth
                  key: organizer_password
            - name: SESSION_SECRET
              valueFrom:
                secretKeyRef:
                  name: rollcaller-auth
                  key: session_secret
          resources:
            # ML warmup (torch+cpu, Kokoro, Allosaurus) is CPU/memory heavy;
            # steady state is much lighter. Tune down after observing.
            requests:
              memory: "1Gi"
              cpu: "1000m"
            limits:
              memory: "4Gi"
              cpu: "2000m"
          # warm_all() runs Kokoro + Allosaurus loading (and first-run HF model
          # downloads) inside the lifespan BEFORE the app is ready, so /health
          # only answers once startup completes. The startupProbe outlasts that.
          startupProbe:
            httpGet:
              path: /health
              port: 8000
            periodSeconds: 10
            failureThreshold: 36   # 360s — covers first-run model downloads
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 5

        # --- Cloud SQL Auth Proxy sidecar (automation-db-v2) ---
        - name: cloud-sql-proxy
          image: gcr.io/cloud-sql-connectors/cloud-sql-proxy:2.14.1
          args:
            - "--structured-logs"
            - "--port=5432"
            - "$(CONNECTION_NAME)"
          env:
            - name: CONNECTION_NAME
              valueFrom:
                secretKeyRef:
                  name: rollcaller-db
                  key: connection_name
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "100m"
          securityContext:
            runAsNonRoot: true
---
apiVersion: v1
kind: Service
metadata:
  name: rollcaller-backend
  namespace: rollcall
  labels:
    app.kubernetes.io/name: rollcaller
    app.kubernetes.io/component: backend
    app.kubernetes.io/part-of: rollcaller
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: rollcaller
    app.kubernetes.io/component: backend
  ports:
    - port: 8000
      targetPort: 8000
      protocol: TCP
      name: http
---
# Shared ingress — nginx longest-prefix match routes browser-direct API
# prefixes (/auth, /invite) to the backend and everything else (/) to the
# frontend. /spaces API calls are SSR-only (in-cluster, never through the
# ingress). /media is served via presigned GCS URLs in prod (no ingress rule).
# letsencrypt-prod uses HTTP-01, so the Cloud DNS A record (ensured by CI)
# must exist before the cert can issue.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: rollcaller
  namespace: rollcall
  labels:
    app.kubernetes.io/name: rollcaller
    app.kubernetes.io/part-of: rollcaller
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - rollcall.jonathansilverstein.us
      secretName: rollcaller-tls
  rules:
    - host: rollcall.jonathansilverstein.us
      http:
        paths:
          - path: /auth
            pathType: Prefix
            backend:
              service:
                name: rollcaller-backend
                port:
                  number: 8000
          - path: /invite
            pathType: Prefix
            backend:
              service:
                name: rollcaller-backend
                port:
                  number: 8000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: rollcaller-frontend
                port:
                  number: 3000
