# Kubernetes ServiceAccount for the rollcaller backend workload.
#
# Workload Identity: this KSA is bound to the GCP service account
#   rollcaller-runtime@personal-project-289714.iam.gserviceaccount.com
# via a one-time IAM policy (see infra runbook in the deploy workflow header).
# The Cloud SQL Auth Proxy sidecar uses this identity to connect to
# automation-db-v2 without stored keys.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: rollcaller
  namespace: rollcall
  labels:
    app.kubernetes.io/name: rollcaller
    app.kubernetes.io/component: backend
    app.kubernetes.io/part-of: rollcaller
  annotations:
    iam.gke.io/gcp-service-account: rollcaller-runtime@personal-project-289714.iam.gserviceaccount.com
